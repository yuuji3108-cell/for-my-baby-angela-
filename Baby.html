<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby 💗</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    max-width:320px;
    width:90%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
}

h1{
    font-size:26px;
    color:#ff4d6d;
}

.message{
    margin-top:15px;
    font-size:18px;
    color:#444;
    min-height:120px;
}

/* Button */
button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,77,109,0.7);
    transition:transform .2s;
}

button:hover{
    transform:scale(1.05);
}

/* Floating hearts */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation: floatUp 6s linear infinite;
    opacity:0.8;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(1);}
    100%{transform:translateY(-110vh) scale(1.5);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Mobile adjustments */
@media(max-width:480px){
    h1{font-size:22px;}
    .message{font-size:16px;}
}
</style>
</head>

<body>

<div class="card">
    <h1>💗 A Message For My Baby 💗</h1>
    <div class="message" id="text"></div>
    <button onclick="showLove()">Open My Heart 💌</button>
</div>

<script>

const message = "I love you soo much baby, you're the most beautiful person God has ever given me, ILOVEYOUUUSOOMUCH ANGELAPOT.";

function showLove(){
    let i = 0;
    const speed = 50;
    const textBox = document.getElementById("text");
    textBox.innerHTML = "";

    function type(){
        if(i < message.length){
            textBox.innerHTML += message.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

/* Create floating hearts */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 10) + "px";
    heart.style.animationDuration = (Math.random()*3 + 4) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
